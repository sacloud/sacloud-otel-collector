receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk:
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true
      network:
      paging:
        metrics:
          system.paging.utilization:
            enabled: true
  filelog:
    start_at: end
    exclude: []
    include:
      - /var/log/example.log

processors:
  resourcedetection:
    detectors: [system]
    system:
      hostname_sources: [os]

# You should set environment variables SACLOUD_*
exporters:
  debug:
  sacloud:
    metrics:
      endpoint: "${SACLOUD_METRICS_ENDPOINT}"
      token: "${SACLOUD_METRICS_TOKEN}"
    logs:
      endpoint: "${SACLOUD_LOGS_ENDPOINT}"
      token: "${SACLOUD_LOGS_TOKEN}"
    traces:
      endpoint: "${SACLOUD_TRACES_ENDPOINT}"
      token: "${SACLOUD_TRACES_TOKEN}"

service:
  pipelines:
    metrics:
      receivers:
        - hostmetrics
      processors:
        - resourcedetection
      exporters:
        - sacloud
        - debug
    logs:
      receivers:
        - filelog
      processors:
        - resourcedetection
      exporters:
        - sacloud
        - debug
    traces:
      receivers:
        - otlp
      processors:
        - resourcedetection
      exporters:
        - sacloud
        - debug
