name: test
on: [pull_request]
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  test:
    name: test build (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ matrix.go-version }}
        id: go

      - name: build and test
        run: |
          make
          ./sacloud-otel-collector components
          ./sacloud-otel-collector --version
          make test

      - name: docker build test
        run: |
          mkdir -p dist/sacloud-otel-collector_linux_amd64
          cp ./sacloud-otel-collector dist/sacloud-otel-collector_linux_amd64/sacloud-otel-collector
          make docker-load
          docker run --rm ghcr.io/sacloud/sacloud-otel-collector:$VERSION --version
        env:
          VERSION: ${{ github.sha }}
