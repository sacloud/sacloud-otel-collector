name: test
on: [pull_request]
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  test:
    name: test build (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
        id: go

      - name: build and test
        run: |
          make
          ./sacloud-otel-collector components
          ./sacloud-otel-collector --version
          make test

      - name: docker build test
        run: |
          mkdir -p dist/sacloud-otel-collector_linux_amd64
          cp ./sacloud-otel-collector dist/sacloud-otel-collector_linux_amd64/sacloud-otel-collector
          make docker-load
          docker run --rm ghcr.io/sacloud/sacloud-otel-collector:$VERSION --version
        env:
          VERSION: ${{ github.sha }}

  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: cmd/sacloud-otel-collector/go.sum

      - name: Build collector
        shell: bash
        run: go build -o ../../sacloud-otel-collector$(go env GOEXE) .
        working-directory: cmd/sacloud-otel-collector

      - name: Install sakumock
        shell: bash
        run: go install "github.com/sacloud/sakumock/monitoringsuite/cmd/sakumock-monitoringsuite@${SAKUMOCK_VERSION}"
        env:
          SAKUMOCK_VERSION: v0.6.0

      - name: Run e2e test
        shell: bash
        run: go test -v ./...
        working-directory: e2e
