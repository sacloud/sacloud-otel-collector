name: test
on: [pull_request]
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  test:
    name: test build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.25"
        id: go

      - name: build and test
        run: |
          make
          ./sacloud-otel-collector components
          ./sacloud-otel-collector --version
          make test

      - name: docker build test
        run: |
          mkdir -p dist/sacloud-otel-collector_linux_amd64
          cp ./sacloud-otel-collector dist/sacloud-otel-collector_linux_amd64/sacloud-otel-collector
          make docker-load
          docker run --rm ghcr.io/sacloud/sacloud-otel-collector:$VERSION --version
        env:
          VERSION: ${{ github.sha }}
