name: tagpr-release
on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true
        default: ""
        type: string
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  test:
    name: run
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || 'main' }}

      - uses: Songmu/tagpr@555e72cee68c09d43dc2337dc9ba890955b630da # v1.19.0
        id: tagpr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ inputs.tag == '' }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
        id: go
        if: ${{ steps.tagpr.outputs.tag != '' || inputs.tag != '' }}

      - name: go mod download
        run: |
          go mod download
        working-directory: cmd/sacloud-otel-collector
        if: ${{ steps.tagpr.outputs.tag != '' || inputs.tag != '' }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          # Limit concurrent builds: linking this collector peaks at ~4GB per
          # target, and the default parallelism (CPU count) OOMs the runner.
          args: release --parallelism 2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ steps.tagpr.outputs.tag != '' || inputs.tag != '' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        if: ${{ steps.tagpr.outputs.tag != '' || inputs.tag != '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        if: ${{ steps.tagpr.outputs.tag != '' || inputs.tag != '' }}

      - name: Docker Login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: $GITHUB_ACTOR
          password: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ steps.tagpr.outputs.tag != '' || inputs.tag != '' }}

      - name: Build and push Docker images
        run: |
          make docker-push
        if: ${{ steps.tagpr.outputs.tag != '' || inputs.tag != '' }}
