receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  sacloud:
    timeout: 60s
    retry_on_failure:
      enabled: true
      initial_interval: 10s
      max_interval: 60s
      max_elapsed_time: 10m
    metrics:
      endpoint: "123456789012"
      token: "test-token"
      remote_write_queue:
        enabled: true
        queue_size: 10000
        num_consumers: 2
    logs:
      endpoint: "123456789012"
      token: "test-token"
      sending_queue:
        enabled: true
        sizer: bytes
        queue_size: 10485760
        num_consumers: 2
        batch:
          flush_timeout: 10s
          max_size: 4194304
    traces:
      endpoint: "123456789012"
      token: "test-token"
      sending_queue:
        enabled: true
        sizer: bytes
        queue_size: 10485760
        num_consumers: 2
        batch:
          flush_timeout: 10s
          max_size: 4194304

service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [sacloud]
    logs:
      receivers: [otlp]
      exporters: [sacloud]
    traces:
      receivers: [otlp]
      exporters: [sacloud]
